<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>架構推薦助理</title>
    <style>
      :root {
        --bg: #f5f5f5;
        --surface: #ffffff;
        --text: #2c2c2c;
        --muted: #6b6b6b;
        --line: #e0e0e0;
        --accent: #2c2c2c;
        --accent-text: #ffffff;
        --radius: 8px;
        --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 900px;
        margin: 0 auto;
        width: 100%;
        background: var(--surface);
        border-left: 1px solid var(--line);
        border-right: 1px solid var(--line);
      }

      .chat-header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }

      .chat-header h2 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 600;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .message {
        display: flex;
        flex-direction: column;
        max-width: 85%;
      }

      .message.user {
        align-self: flex-end;
      }

      .message.assistant {
        align-self: flex-start;
      }

      .message-content {
        padding: 12px 16px;
        border-radius: var(--radius);
        line-height: 1.6;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .message.user .message-content {
        background: var(--accent);
        color: var(--accent-text);
        border-top-right-radius: 2px;
      }

      .message.assistant .message-content {
        background: #f1f1f1;
        color: var(--text);
        border-top-left-radius: 2px;
      }
      
      .message-time {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 4px;
        align-self: flex-end;
      }

      .message.assistant .message-time {
        align-self: flex-start;
      }

      /* Card Styles inside Chat */
      .plan-card {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        overflow: hidden;
        white-space: normal; /* Fixes huge gaps caused by template literal newlines */
      }
      
      .plan-header {
        background: #fafafa;
        padding: 10px 14px;
        border-bottom: 1px solid var(--line);
        font-weight: 600;
        font-size: 0.95rem;
      }
      
      .plan-body {
        padding: 14px;
      }

      .plan-section {
        margin-bottom: 14px;
      }

      .plan-section:last-child {
        margin-bottom: 0;
      }

      .plan-section-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .machine-row {
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        margin-bottom: 6px;
        background: #fafafa;
      }

      .machine-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
      }

      .machine-title {
        font-weight: 600;
      }
      
      .machine-type {
        font-size: 0.8rem;
        padding: 2px 8px;
        background: #e0e0e0;
        border-radius: 12px;
      }

      .machine-specs {
        display: flex;
        gap: 12px;
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .machine-reason {
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .chat-input-area {
        padding: 16px 24px;
        border-top: 1px solid var(--line);
        background: var(--surface);
      }

      textarea {
        width: 100%;
        min-height: 80px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        resize: vertical;
        font-family: inherit;
        font-size: 1rem;
        margin-bottom: 12px;
      }

      textarea:focus {
        outline: none;
        border-color: var(--muted);
      }

      .chat-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: var(--radius);
        font-size: 0.95rem;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--accent);
        color: var(--accent-text);
        font-weight: 600;
      }

      .btn-primary:hover {
        background: #444;
      }

      .btn-secondary {
        background: #f1f1f1;
        color: var(--text);
        border: 1px solid var(--line);
      }

      .btn-secondary:hover {
        background: #e4e4e4;
      }

      .metrics-panel {
        display: flex;
        justify-content: center;
        gap: 24px;
        padding: 8px 16px;
        background: #fafafa;
        border-top: 1px solid var(--line);
        font-size: 0.75rem;
        color: var(--muted);
        font-family: monospace;
      }

      .typing-indicator {
        color: var(--muted);
        font-size: 0.9rem;
        display: none;
        padding: 0 24px 16px;
      }
    </style>
  </head>
  <body>
    <div class="chat-wrapper">
      <div class="chat-header">
        <h2>架構推薦助理</h2>
      </div>
      
      <div class="chat-messages" id="chat-messages">
        <div class="message assistant">
          <div class="message-content">您好！我是基礎設施架構助理。請告訴我您的專案需求（例如：想架設什麼服務、預計多少人使用、是否需要資料庫等），我會引導您完成架構規劃。隨時可以點擊下方按鈕產出架構。</div>
          <div class="message-time">System</div>
        </div>
      </div>
      
      <div class="typing-indicator" id="typing-indicator">分析中...</div>

      <div class="chat-input-area">
        <textarea id="user-input" placeholder="請描述您的需求... (Enter 發送, Shift+Enter 換行)"></textarea>
        <div class="chat-actions">
          <button id="btn-generate" class="btn btn-secondary" type="button">產出架構配置</button>
          <button id="btn-send" class="btn btn-primary" type="button">發送</button>
        </div>
      </div>
    </div>

    <div class="metrics-panel">
      <span>Input Tokens: <span id="metric-input">0</span></span>
      <span>Total Tokens: <span id="metric-total">0</span></span>
      <span>Time: <span id="metric-time">0.0</span>s</span>
      <span>Speed: <span id="metric-speed">0.0</span>t/s</span>
    </div>

    <script>
      const chatMessages = document.getElementById("chat-messages");
      const userInput = document.getElementById("user-input");
      const btnSend = document.getElementById("btn-send");
      const btnGenerate = document.getElementById("btn-generate");
      const typingIndicator = document.getElementById("typing-indicator");
      
      const metricInput = document.getElementById("metric-input");
      const metricTotal = document.getElementById("metric-total");
      const metricTime = document.getElementById("metric-time");
      const metricSpeed = document.getElementById("metric-speed");

      let apiBaseUrl = "";
      let conversationHistory = [];
      let isPlanGenerated = false; // 追蹤是否已經產出過架構

      async function loadUiConfig() {
        try {
          const response = await fetch("/ui-config");
          if (!response.ok) throw new Error("config fetch failed");
          const data = await response.json();
          apiBaseUrl = (data.api_base_url || "").replace(/\/$/, "");
        } catch (e) {
          apiBaseUrl = "";
        }
      }

      function escapeHtml(text) {
        return String(text ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // Frontend fallback: strip <think>...</think> blocks emitted by the model
      function stripThinkTags(text) {
        const str = String(text ?? "");
        const stripped = str.replace(/<think>[\s\S]*?<\/think>/gi, "").trim();
        return stripped || str.trim();
      }


      function updateMetrics(metrics) {
        if (!metrics) return;
        metricInput.textContent = metrics.prompt_tokens ?? 0;
        metricTotal.textContent = metrics.total_tokens ?? 0;
        metricTime.textContent = (metrics.elapsed_seconds ?? 0).toFixed(3);
        metricSpeed.textContent = (metrics.tokens_per_second ?? 0).toFixed(2);
      }

      function pushToHistory(role, content) {
        conversationHistory.push({ role, content });
        if (conversationHistory.length > 10) {
          conversationHistory = conversationHistory.slice(-10);
        }
      }

      function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function renderMessage(role, contentHtml) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}`;
        
        const contentDiv = document.createElement("div");
        contentDiv.className = "message-content";
        contentDiv.innerHTML = contentHtml;

        const timeDiv = document.createElement("div");
        timeDiv.className = "message-time";
        const now = new Date();
        timeDiv.textContent = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

        msgDiv.appendChild(contentDiv);
        msgDiv.appendChild(timeDiv);
        chatMessages.appendChild(msgDiv);
        scrollToBottom();
      }

      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        userInput.value = "";
        userInput.focus();

        renderMessage("user", escapeHtml(text));
        pushToHistory("user", text);

        if (isPlanGenerated) {
          await generateArch();
        } else {
          await callChatApi();
        }
      }

      async function callChatApi() {
        typingIndicator.style.display = "block";
        btnSend.disabled = true;
        btnGenerate.disabled = true;

        try {
          const res = await fetch(`${apiBaseUrl}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: conversationHistory })
          });

          if (!res.ok) throw new Error(await res.text());

          const data = await res.json();
          
          updateMetrics({
            prompt_tokens: data.prompt_tokens,
            total_tokens: data.total_tokens,
            elapsed_seconds: data.elapsed_seconds,
            tokens_per_second: data.tokens_per_second
          });

          renderMessage("assistant", escapeHtml(stripThinkTags(data.reply)));
          pushToHistory("assistant", data.reply);

        } catch (err) {
          renderMessage("assistant", `[系統異常] ${escapeHtml(err.message)}`);
        } finally {
          typingIndicator.style.display = "none";
          btnSend.disabled = false;
          btnGenerate.disabled = false;
        }
      }

      async function generateArch() {
        if (conversationHistory.length === 0) {
          alert("請先描述您的需求再產出架構。");
          return;
        }

        typingIndicator.style.display = "block";
        typingIndicator.textContent = "萃取需求與產出架構中...";
        btnSend.disabled = true;
        btnGenerate.disabled = true;

        try {
          const res = await fetch(`${apiBaseUrl}/recommend`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: conversationHistory, top_k: 5, device_nodes: [] })
          });

          if (!res.ok) throw new Error(await res.text());

          const data = await res.json();
          updateMetrics(data.ai_metrics);

          const plan = data.final_plan;
          
          let cardHtml = `<div class="plan-card">
            <div class="plan-header">系統產出架構規劃</div>
            <div class="plan-body">`;
          
          if (plan.overall_config && plan.overall_config.deployment_strategy) {
            cardHtml += `<div class="plan-section">
              <div class="plan-section-title">總結原因</div>
              <div>${escapeHtml(plan.overall_config.deployment_strategy)}</div>
            </div>`;
          }

          if (plan.recommended_templates && plan.recommended_templates.length > 0) {
            cardHtml += `<div class="plan-section">
              <div class="plan-section-title">核心模板</div>`;
            plan.recommended_templates.forEach(t => {
              cardHtml += `
                <div class="machine-row">
                  <div class="machine-top">
                    <span class="machine-title">${escapeHtml(t.name)} <span style="font-weight:normal;color:#666;">(${escapeHtml(t.slug)})</span></span>
                  </div>
                  <div class="machine-reason">${escapeHtml(t.why)}</div>
                </div>
              `;
            });
            cardHtml += `</div>`;
          }

          if (plan.possible_needed_templates && plan.possible_needed_templates.length > 0) {
            cardHtml += `<div class="plan-section">
              <div class="plan-section-title">擴充 / 支援模板</div>`;
            plan.possible_needed_templates.forEach(t => {
              cardHtml += `
                <div class="machine-row">
                  <div class="machine-top">
                    <span class="machine-title">${escapeHtml(t.name)} <span style="font-weight:normal;color:#666;">(${escapeHtml(t.slug)})</span></span>
                  </div>
                  <div class="machine-reason">${escapeHtml(t.why)}</div>
                </div>
              `;
            });
            cardHtml += `</div>`;
          }

          cardHtml += `<div class="plan-section">
            <div class="plan-section-title">機器配置</div>`;
            
          if (plan.machines && plan.machines.length > 0) {
            plan.machines.forEach(m => {
              const deployType = String(m.deployment_type||"").toLowerCase() === "vm" ? "VM" : "LXC";
              cardHtml += `
                <div class="machine-row">
                  <div class="machine-top">
                    <span class="machine-title">${escapeHtml(m.name)} <span style="font-weight:normal;color:#666;">(${escapeHtml(m.template_slug)})</span></span>
                    <span class="machine-type">${deployType}</span>
                  </div>
                  <div class="machine-specs">
                    <span>CPU: ${m.cpu}</span>
                    <span>RAM: ${m.memory_mb} MB</span>
                    <span>Disk: ${m.disk_gb} GB</span>
                    <span>GPU: ${m.gpu}</span>
                  </div>
                  <div class="machine-reason">${escapeHtml(m.why)}</div>
                </div>
              `;
            });
          } else {
            cardHtml += `<div class="machine-row"><div class="machine-reason">目前無可顯示的機器配置（可能是 AI 選擇了系統無法辨識的模板名稱）。</div></div>`;
          }
          cardHtml += `</div>`;


          cardHtml += `</div></div>`;

          renderMessage("assistant", cardHtml);

          // Keep architecture card visible in UI, but do not feed this system summary back
          // into assistant chat history to avoid contaminating later intent extraction.
          isPlanGenerated = true; // 狀態標記為已產生架構，後續對話將直接觸發微調

        } catch (err) {
          renderMessage("assistant", `[產出失敗] ${escapeHtml(err.message)}`);
        } finally {
          typingIndicator.style.display = "none";
          typingIndicator.textContent = "分析中...";
          btnSend.disabled = false;
          btnGenerate.disabled = false;
        }
      }

      btnSend.addEventListener("click", sendMessage);
      btnGenerate.addEventListener("click", generateArch);

      userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      loadUiConfig();
    </script>
  </body>
</html>
