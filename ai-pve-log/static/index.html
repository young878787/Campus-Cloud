<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus PVE AI 查詢</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --panel:     #1a1d27;
      --border:    #2e3148;
      --accent:    #5c7cfa;
      --accent2:   #748ffc;
      --text:      #e2e5f0;
      --muted:     #8891b0;
      --tag-bg:    #1e2540;
      --tag-tool:  #12213a;
      --tag-tool-border: #2a4a7f;
      --success:   #51cf66;
      --warn:      #ffd43b;
      --error:     #ff6b6b;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .3px; }
    header span { color: var(--muted); font-size: .85rem; margin-left: auto; }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 20px 0;
      gap: 20px;
    }

    /* ── Example chips ── */
    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .examples p {
      width: 100%;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .chip {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: .83rem;
      color: var(--text);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .chip:hover { border-color: var(--accent); background: #1e2540; }

    /* ── Chat area ── */
    #chat-box {
      display: flex;
      flex-direction: column;
      gap: 18px;
      flex: 1;
      overflow-y: auto;
      padding-bottom: 16px;
    }

    /* ── Message bubbles ── */
    .msg { display: flex; gap: 12px; }
    .msg.user  { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem;
      font-weight: 700;
    }
    .msg.user  .avatar { background: var(--accent);  color: #fff; }
    .msg.ai    .avatar { background: #2a3460; color: var(--accent2); }
    .msg.error .avatar { background: #3a1a1a; color: var(--error); }

    .bubble {
      max-width: 76%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user  .bubble { background: #1e2540; border-color: #2e3d7a; border-radius: var(--radius) 2px var(--radius) var(--radius); }
    .msg.ai    .bubble { border-radius: 2px var(--radius) var(--radius) var(--radius); }
    .msg.error .bubble { border-color: #5a2020; background: #2a1212; color: var(--error); border-radius: 2px var(--radius) var(--radius) var(--radius); }

    /* ── Tools badge section ── */
    .tools-section {
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    .tools-toggle {
      background: none;
      border: none;
      color: var(--muted);
      font-size: .78rem;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color .15s;
    }
    .tools-toggle:hover { color: var(--accent2); }
    .tools-toggle .arrow { transition: transform .2s; display: inline-block; }
    .tools-toggle.open .arrow { transform: rotate(90deg); }

    .tools-list {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }
    .tools-list.open { display: flex; }

    .tool-item {
      background: var(--tag-tool);
      border: 1px solid var(--tag-tool-border);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: .78rem;
      font-family: 'Cascadia Code', 'Consolas', monospace;
    }
    .tool-name { color: var(--accent2); font-weight: 600; }
    .tool-args { color: var(--muted); margin-left: 6px; }

    /* ── Typing indicator ── */
    .typing-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: .2; transform: scale(.85); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Input area ── */
    .input-wrap {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 24px;
      transition: border-color .2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: .95rem;
      resize: none;
      max-height: 160px;
      line-height: 1.5;
      font-family: inherit;
    }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 7px;
      width: 38px; height: 38px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, opacity .15s;
      color: #fff;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent2); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#5c7cfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="20" height="14" rx="2"/>
    <path d="M8 21h8M12 17v4"/>
    <path d="M9 8l2 2-2 2M13 10h2"/>
  </svg>
  <h1>Campus PVE AI 查詢</h1>
  <span>Tool Calling · Qwen3 · 單次查詢</span>
</header>

<main>
  <div class="examples" id="examples">
    <p>範例問題（點擊填入）</p>
    <div class="chip">列出所有停止的 LXC</div>
    <div class="chip">哪個節點 CPU 使用率最高？</div>
    <div class="chip">目前有幾台 VM 在運行？</div>
    <div class="chip">vmid 100 的記憶體用了多少？</div>
    <div class="chip">local-lvm 還有多少可用空間？</div>
    <div class="chip">列出所有節點的狀態</div>
    <div class="chip">有哪些 LXC 容器的 IP 是多少？</div>
    <div class="chip">叢集目前的 quorum 狀態？</div>
  </div>

  <div id="chat-box"></div>

  <div class="input-wrap">
    <textarea id="user-input" rows="1" placeholder="輸入問題，例如：列出所有運行中的 VM…"></textarea>
    <button id="send-btn" title="送出">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</main>

<script>
  const chatBox   = document.getElementById('chat-box');
  const input     = document.getElementById('user-input');
  const sendBtn   = document.getElementById('send-btn');

  // ── 自動高度 textarea ─────────────────────────────────────
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // ── 範例 chip ────────────────────────────────────────────
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      input.value = chip.textContent;
      input.dispatchEvent(new Event('input'));
      input.focus();
    });
  });

  // ── 新增訊息氣泡 ─────────────────────────────────────────
  function addMsg(role, text, toolsCalled) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '我' : role === 'error' ? '!' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    // 工具呼叫清單（AI 訊息才有）
    if (role === 'ai' && toolsCalled && toolsCalled.length > 0) {
      const sec = document.createElement('div');
      sec.className = 'tools-section';

      const toggle = document.createElement('button');
      toggle.className = 'tools-toggle';
      toggle.innerHTML = `<span class="arrow">▶</span> 使用了 ${toolsCalled.length} 個工具`;

      const list = document.createElement('div');
      list.className = 'tools-list';
      toolsCalled.forEach(tc => {
        const item = document.createElement('div');
        item.className = 'tool-item';
        const argsStr = Object.keys(tc.args).length
          ? JSON.stringify(tc.args, null, 0)
          : '（無參數）';
        // 使用 textContent 而非 innerHTML，避免 AI 回傳含 < > 字元時破版
        const nameSpan = document.createElement('span');
        nameSpan.className = 'tool-name';
        nameSpan.textContent = tc.name;
        const argsSpan = document.createElement('span');
        argsSpan.className = 'tool-args';
        argsSpan.textContent = argsStr;
        item.appendChild(nameSpan);
        item.appendChild(argsSpan);
        list.appendChild(item);
      });

      toggle.addEventListener('click', () => {
        toggle.classList.toggle('open');
        list.classList.toggle('open');
      });

      sec.appendChild(toggle);
      sec.appendChild(list);
      bubble.appendChild(sec);
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatBox.appendChild(wrap);
    chatBox.scrollTop = chatBox.scrollHeight;
    return wrap;
  }

  // ── Typing 指示器 ─────────────────────────────────────────
  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    wrap.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatBox.appendChild(wrap);
    chatBox.scrollTop = chatBox.scrollHeight;
    return wrap;
  }

  // ── 送出 ─────────────────────────────────────────────────
  async function send() {
    const msg = input.value.trim();
    if (!msg || sendBtn.disabled) return;

    addMsg('user', msg);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const typing = addTyping();

    // AbortController：超過 150 秒自動中止（對應後端 chat_timeout=120 + 緩衝）
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 150_000);

    try {
      const res = await fetch('/api/v1/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg }),
        signal: controller.signal,
      });

      const contentType = res.headers.get('content-type') || '';
      const rawText = await res.text();
      const text = rawText.trim();
      let data = {};

      if (text) {
        if (contentType.includes('application/json')) {
          try {
            data = JSON.parse(text);
          } catch (parseErr) {
            throw new Error(`HTTP ${res.status}：JSON 解析失敗，回應內容：${text.slice(0, 200)}`);
          }
        } else if (!res.ok) {
          typing.remove();
          addMsg('error', `HTTP ${res.status}：${text.slice(0, 200)}`);
          return;
        } else {
          throw new Error(`HTTP ${res.status}：預期為 JSON，但收到 ${contentType || '未知 Content-Type'}，回應內容：${text.slice(0, 200)}`);
        }
      }

      typing.remove();

      if (!res.ok) {
        addMsg('error', `HTTP ${res.status}：${data.detail || JSON.stringify(data) || '空回應'}`);
        return;
      }

      if (data.error) {
        addMsg('error', `錯誤：${data.error}`);
        return;
      }

      addMsg('ai', data.reply || '（AI 沒有回傳任何內容）', data.tools_called);

    } catch (err) {
      typing.remove();
      if (err.name === 'AbortError') {
        addMsg('error', '請求逾時（超過 150 秒），請稍後再試或檢查服務狀態');
      } else {
        addMsg('error', `連線失敗：${err.message}`);
      }
    } finally {
      clearTimeout(timeoutId);
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', send);
</script>
</body>
</html>
