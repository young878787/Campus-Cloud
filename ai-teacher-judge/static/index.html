<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>評分助理</title>
    <style>
      :root {
        --bg: #f5f5f5;
        --surface: #ffffff;
        --text: #2c2c2c;
        --muted: #6b6b6b;
        --line: #e0e0e0;
        --accent: #2c2c2c;
        --accent-text: #ffffff;
        --radius: 8px;
        --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        --auto-bg: #d8f5e1;
        --auto-fg: #1a6b35;
        --partial-bg: #fff3cd;
        --partial-fg: #7a5900;
        --manual-bg: #fddede;
        --manual-fg: #8b1a1a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 900px;
        margin: 0 auto;
        width: 100%;
        background: var(--surface);
        border-left: 1px solid var(--line);
        border-right: 1px solid var(--line);
        min-height: 0;
      }

      .chat-header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-shrink: 0;
      }

      .chat-header h2 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 600;
      }

      .header-actions {
        display: flex;
        gap: 8px;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        min-height: 0;
      }

      .message {
        display: flex;
        flex-direction: column;
        max-width: 90%;
      }

      .message.user { align-self: flex-end; }
      .message.assistant { align-self: flex-start; }

      .message-content {
        padding: 12px 16px;
        border-radius: var(--radius);
        line-height: 1.6;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .message.user .message-content {
        background: var(--accent);
        color: var(--accent-text);
        border-top-right-radius: 2px;
      }

      .message.assistant .message-content {
        background: #f1f1f1;
        color: var(--text);
        border-top-left-radius: 2px;
      }

      .message-time {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 4px;
        align-self: flex-end;
      }

      .message.assistant .message-time { align-self: flex-start; }

      /* ── Upload drop zone ── */
      .upload-zone {
        border: 2px dashed var(--line);
        border-radius: var(--radius);
        padding: 32px 24px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        background: #fafafa;
        margin-bottom: 0;
      }

      .upload-zone.drag-over {
        border-color: var(--accent);
        background: #f0f0f0;
      }

      .upload-zone-icon { font-size: 2.4rem; margin-bottom: 8px; }

      .upload-zone p {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .upload-zone strong { color: var(--text); }

      /* ── Rubric plan card ── */
      .plan-card {
        margin-top: 4px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        overflow: hidden;
        white-space: normal;
        width: 100%;
      }

      .plan-header {
        background: #fafafa;
        padding: 10px 14px;
        border-bottom: 1px solid var(--line);
        font-weight: 600;
        font-size: 0.95rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .plan-body { padding: 14px; }

      .plan-section { margin-bottom: 14px; }
      .plan-section:last-child { margin-bottom: 0; }

      .plan-section-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .machine-row {
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        margin-bottom: 6px;
        background: #fafafa;
      }

      .machine-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 6px;
        gap: 8px;
      }

      .machine-title { font-weight: 600; flex: 1; }

      .badge {
        font-size: 0.78rem;
        padding: 2px 10px;
        border-radius: 12px;
        white-space: nowrap;
        font-weight: 500;
        flex-shrink: 0;
      }

      .badge-auto    { background: var(--auto-bg);    color: var(--auto-fg); }
      .badge-partial { background: var(--partial-bg); color: var(--partial-fg); }
      .badge-manual  { background: var(--manual-bg);  color: var(--manual-fg); }

      .machine-specs {
        display: flex;
        gap: 12px;
        font-size: 0.95rem;
        color: var(--muted);
        margin-bottom: 6px;
        flex-wrap: wrap;
        align-items: flex-start;
      }

      .machine-reason { font-size: 0.88rem; line-height: 1.5; color: #444; }

      /* ── Chat input area ── */
      .chat-input-area {
        padding: 16px 24px;
        border-top: 1px solid var(--line);
        background: var(--surface);
        flex-shrink: 0;
      }

      textarea {
        width: 100%;
        min-height: 72px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        resize: vertical;
        font-family: inherit;
        font-size: 1rem;
        margin-bottom: 10px;
      }

      textarea:focus {
        outline: none;
        border-color: var(--muted);
      }

      .chat-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .chat-actions-left { display: flex; gap: 8px; }

      .btn {
        padding: 9px 18px;
        border: none;
        border-radius: var(--radius);
        font-size: 0.92rem;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
      }

      .btn-primary { background: var(--accent); color: var(--accent-text); font-weight: 600; }
      .btn-primary:hover { background: #444; }
      .btn-secondary { background: #f1f1f1; color: var(--text); border: 1px solid var(--line); }
      .btn-secondary:hover { background: #e4e4e4; }
      .btn-success { background: #1a6b35; color: #fff; font-weight: 600; }
      .btn-success:hover { background: #155228; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .metrics-panel {
        display: flex;
        justify-content: center;
        gap: 24px;
        padding: 8px 16px;
        background: #fafafa;
        border-top: 1px solid var(--line);
        font-size: 0.75rem;
        color: var(--muted);
        font-family: monospace;
        flex-shrink: 0;
      }

      .typing-indicator {
        color: var(--muted);
        font-size: 0.9rem;
        display: none;
        padding: 0 24px 12px;
        flex-shrink: 0;
      }

      #file-input { display: none; }

      .summary-box {
        background: #f8f8f8;
        border-radius: var(--radius);
        padding: 10px 14px;
        font-size: 0.9rem;
        line-height: 1.6;
        color: #444;
        border-left: 3px solid #ccc;
        margin-bottom: 10px;
      }

      /* ── Editable form ── */
      .editable-input, .editable-textarea {
        width: 100%;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 4px;
        font-family: inherit;
        color: inherit;
        transition: border-color 0.2s, background 0.2s;
        padding: 4px 6px;
        margin: -4px -6px;
      }
      .editable-input:hover, .editable-textarea:hover {
        border-color: #ddd;
        background: #fff;
      }
      .editable-input:focus, .editable-textarea:focus {
        outline: none;
        border-color: var(--accent);
        background: #fff;
      }
      .editable-textarea {
        resize: vertical;
        min-height: 28px;
        line-height: inherit;
        display: block;
        margin-top: 4px;
        overflow: hidden;
      }
      .editable-title {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 2px;
      }
      .btn-delete-node {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 1rem;
        padding: 2px 6px;
        border-radius: 4px;
        transition: background 0.2s, color 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .btn-delete-node:hover {
        background: #fddede;
        color: #d32f2f;
      }
      .btn-add-wrapper {
        text-align: center;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px dashed var(--line);
      }
      .btn-add-node {
        background: #fafafa;
        border: 1px dashed var(--muted);
        color: var(--muted);
        border-radius: var(--radius);
        padding: 6px 16px;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
      }
      .btn-add-node:hover {
        border-color: var(--accent);
        color: var(--text);
        background: #f0f0f0;
      }
      select.editable-input {
        appearance: none;
        cursor: pointer;
        padding-right: 18px;
        background: transparent url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'%3E%3Cpath fill='%23666' d='M3 4l3 3 3-3'/%3E%3C/svg%3E") no-repeat right 4px center;
        background-size: 10px;
      }
      select.editable-input:hover,
      select.editable-input:focus {
        background-color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="chat-wrapper">
      <div class="chat-header">
        <h2>📋 評分助理</h2>
        <div class="header-actions">
          <button id="btn-upload-new" class="btn btn-secondary" type="button" title="上傳新的評分表">📁 換份評分表</button>
          <button id="btn-download" class="btn btn-success" type="button" title="下載 Excel 評分表" style="display:none;">📥 下載 Excel</button>
        </div>
      </div>

      <div class="chat-messages" id="chat-messages">
        <!-- 初始上傳區 (assistant 訊息樣式) -->
        <div class="message assistant" id="upload-area-msg">
          <div class="message-content" style="background:#fafafa; border:1px solid var(--line); padding:0;">
            <div id="upload-zone" class="upload-zone">
              <div class="upload-zone-icon">📄</div>
              <p><strong>拖曳評分表至此</strong>，或點擊選擇檔案</p>
              <p style="margin-top:6px; font-size:0.82rem;">支援：.docx、.pdf（純文字型）</p>
            </div>
          </div>
          <div class="message-time">System</div>
        </div>
      </div>

      <div class="typing-indicator" id="typing-indicator">分析中...</div>

      <div class="chat-input-area">
        <textarea id="user-input" placeholder="上傳評分表後可在此與 AI 對話精煉（Enter 發送，Shift+Enter 換行）" disabled></textarea>
        <div class="chat-actions">
          <div class="chat-actions-left">
            <button id="btn-upload-trigger" class="btn btn-secondary" type="button">📁 上傳評分表</button>
          </div>
          <button id="btn-send" class="btn btn-primary" type="button" disabled>發送</button>
        </div>
      </div>
    </div>

    <div class="metrics-panel">
      <span>Input Tokens: <span id="metric-input">0</span></span>
      <span>Total Tokens: <span id="metric-total">0</span></span>
      <span>Time: <span id="metric-time">0.0</span>s</span>
      <span>Speed: <span id="metric-speed">0.0</span>t/s</span>
    </div>

    <input type="file" id="file-input" accept=".docx,.pdf" />

    <script>
      // ── DOM refs ──
      const chatMessages     = document.getElementById("chat-messages");
      const userInput        = document.getElementById("user-input");
      const btnSend          = document.getElementById("btn-send");
      const btnUploadTrigger = document.getElementById("btn-upload-trigger");
      const btnUploadNew     = document.getElementById("btn-upload-new");
      const btnDownload      = document.getElementById("btn-download");
      const fileInput        = document.getElementById("file-input");
      const uploadZone       = document.getElementById("upload-zone");
      const typingIndicator  = document.getElementById("typing-indicator");
      const metricInput      = document.getElementById("metric-input");
      const metricTotal      = document.getElementById("metric-total");
      const metricTime       = document.getElementById("metric-time");
      const metricSpeed      = document.getElementById("metric-speed");

      let apiBaseUrl         = "";
      let conversationHistory = [];
      let currentRubricItems  = [];   // RubricItem[]
      let currentRubricSummary = "";  // AI 整體說明
      let currentEditableCardDiv = null; // 最新渲染、處於可編輯狀態的卡片 DOM

      // ── Config ──
      async function loadUiConfig() {
        try {
          const res = await fetch("/ui-config");
          if (!res.ok) throw new Error("config fetch failed");
          const data = await res.json();
          apiBaseUrl = (data.api_base_url || "").replace(/\/$/, "");
        } catch { apiBaseUrl = ""; }
      }

      // ── Helpers ──
      function escapeHtml(text) {
        return String(text ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function stripThinkTags(text) {
        const str = String(text ?? "");
        const stripped = str.replace(/<think>[\s\S]*?<\/think>/gi, "").trim();
        return stripped || str.trim();
      }

      // ── 統一的統計計算函數 ──
      function calculateRubricStats(items) {
        return {
          autoCount: items.filter(i => i.detectable === "auto").length,
          partialCount: items.filter(i => i.detectable === "partial").length,
          manualCount: items.filter(i => i.detectable === "manual").length,
          totalScore: items.reduce((s, i) => s + (parseFloat(i.max_score) || 0), 0)
        };
      }

      // ── 防抖函數 ──
      function debounce(func, wait) {
        let timeout;
        return function(...args) {
          clearTimeout(timeout);
          timeout = setTimeout(() => func.apply(this, args), wait);
        };
      }

      function updateMetrics(m) {
        if (!m) return;
        metricInput.textContent = m.prompt_tokens ?? 0;
        metricTotal.textContent = m.total_tokens   ?? 0;
        metricTime.textContent  = (m.elapsed_seconds  ?? 0).toFixed(3);
        metricSpeed.textContent = (m.tokens_per_second ?? 0).toFixed(2);
      }

      function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function now() {
        const d = new Date();
        return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
      }

      function renderMessage(role, contentHtml) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}`;
        const contentDiv = document.createElement("div");
        contentDiv.className = "message-content";
        contentDiv.innerHTML = contentHtml;
        const timeDiv = document.createElement("div");
        timeDiv.className = "message-time";
        timeDiv.textContent = now();
        msgDiv.appendChild(contentDiv);
        msgDiv.appendChild(timeDiv);
        chatMessages.appendChild(msgDiv);
        scrollToBottom();
        return msgDiv;
      }

      // ── Rubric card renderer ──
      function badgeClass(detectable) {
        if (detectable === "auto")    return "badge badge-auto";
        if (detectable === "partial") return "badge badge-partial";
        return "badge badge-manual";
      }

      function badgeLabel(detectable) {
        if (detectable === "auto")    return "✅ 可自動偵測";
        if (detectable === "partial") return "⚠️ 部分可偵測";
        return "❌ 需人工評閱";
      }

      function renderRubricCard(analysis, title = "📋 評分表分析結果", isEditable = false) {
        const { items, total_score, auto_count, partial_count, manual_count, summary } = analysis;

        let html = `<div class="plan-card">
          <div class="plan-header">
            <span>${escapeHtml(title)}</span>
            <span style="font-size:0.82rem;font-weight:400;color:var(--muted);" class="header-metrics">
              總分 <span class="score-total">${total_score}</span> ｜ 
              自動 ${auto_count} / 
              部分 ${partial_count} / 
              人工 ${manual_count}
            </span>
          </div>
          <div class="plan-body">`;

        if (summary) {
          html += `<div class="summary-box">${escapeHtml(summary)}</div>`;
        }

        html += `<div class="plan-section">
          <div class="plan-section-title">評分項目</div>`;

        items.forEach((item, index) => {
          const bc = badgeClass(item.detectable);
          const bl = badgeLabel(item.detectable);
          html += `<div class="machine-row">
            <div class="machine-top">
              ${isEditable ? 
                `<input type="text" class="editable-input editable-title" data-index="${index}" data-field="title" value="${escapeHtml(item.title)}" oninput="updateRubricItem(this)" placeholder="評分標題">` 
                : `<span class="machine-title">${escapeHtml(item.title)}</span>`
              }
              ${isEditable ? `
                <select class="editable-input" style="width: auto; font-size: 0.9rem; margin: 0; padding: 2px 18px 2px 4px" data-index="${index}" data-field="detectable" onchange="updateRubricItem(this)">
                  <option value="auto" ${item.detectable === 'auto' ? 'selected' : ''}>✅ 可自動偵測</option>
                  <option value="partial" ${item.detectable === 'partial' ? 'selected' : ''}>⚠️ 部分可偵測</option>
                  <option value="manual" ${item.detectable === 'manual' ? 'selected' : ''}>❌ 需人工評閱</option>
                </select>
                <button class="btn-delete-node" onclick="removeRubricItem(${index})" title="刪除節點">✖</button>
              ` : `<span class="${bc}">${bl}</span>`}
            </div>
            <div class="machine-specs">
              <span style="display: flex; align-items: center; white-space: nowrap;">配分：${isEditable ? `<input type="number" class="editable-input" style="width: 60px; font-size: 0.95rem; padding: 0" data-index="${index}" data-field="max_score" value="${item.max_score}" oninput="updateRubricItem(this)">` : item.max_score}</span>
              ${(item.detection_method || isEditable) ? `<span style="flex: 1; display: flex; align-items: flex-start; min-width: 250px;">偵測：${isEditable ? `<textarea class="editable-textarea" style="flex: 1; margin: -2px 0 0 0; min-height: 24px; padding: 2px" data-index="${index}" data-field="detection_method" oninput="updateRubricItem(this); this.style.height = ''; this.style.height = this.scrollHeight + 'px'" placeholder="詳細偵測方式（可空白）">${escapeHtml(item.detection_method || "")}</textarea>` : escapeHtml(item.detection_method)}</span>` : ""}
            </div>
            ${(item.description || isEditable) ? (isEditable ? `<textarea class="editable-textarea" data-index="${index}" data-field="description" oninput="updateRubricItem(this)" placeholder="項目說明..." oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'">${escapeHtml(item.description || "")}</textarea>` : `<div class="machine-reason">${escapeHtml(item.description)}</div>`) : ""}
            ${(item.fallback || isEditable) ? (isEditable ? `<textarea class="editable-textarea" style="color:var(--muted); min-height: 20px;" data-index="${index}" data-field="fallback" oninput="updateRubricItem(this)" placeholder="💡 備用人工評分提示..." oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'">${escapeHtml(item.fallback || "")}</textarea>` : `<div class="machine-reason" style="margin-top:4px;color:var(--muted);">💡 ${escapeHtml(item.fallback)}</div>`) : ""}
          </div>`;
        });

        if (isEditable) {
           html += `<div class="btn-add-wrapper"><button class="btn-add-node" onclick="addRubricItem()">+ 新增評分項目</button></div>`;
        }

        html += `</div></div></div>`;
        return html;
      }

      function freezeOldCard() {
        if (!currentEditableCardDiv) return;
        const inputs = currentEditableCardDiv.querySelectorAll('input, select, textarea, button');
        inputs.forEach(el => el.disabled = true);
        const addWrapper = currentEditableCardDiv.querySelector('.btn-add-wrapper');
        if (addWrapper) addWrapper.remove();
        const delBtns = currentEditableCardDiv.querySelectorAll('.btn-delete-node');
        delBtns.forEach(btn => btn.remove());
        currentEditableCardDiv = null;
      }

      function updateRubricItem(el) {
        const index = parseInt(el.getAttribute("data-index"), 10);
        const field = el.getAttribute("data-field");
        if (currentRubricItems[index]) {
          let val = el.value;
          if (field === "max_score") val = parseFloat(val) || 0;
          currentRubricItems[index][field] = val;
          
          if (field === "max_score" || field === "detectable") {
            const stats = calculateRubricStats(currentRubricItems);
            const header = el.closest('.plan-card').querySelector('.header-metrics');
            if (header) {
              header.innerHTML = `總分 <span class="score-total">${stats.totalScore}</span> ｜ 自動 ${stats.autoCount} / 部分 ${stats.partialCount} / 人工 ${stats.manualCount}`;
            }
          }
        }
      }

      function removeRubricItem(index) {
        if (!confirm('確定刪除這個評分項目嗎？')) return;
        currentRubricItems.splice(index, 1);
        reRenderCurrentCard();
      }

      function addRubricItem() {
        const newId = "item-" + (Date.now() % 100000) + "-" + Math.floor(Math.random() * 1000);
        currentRubricItems.push({
           id: newId,
           title: "新增評分項目（請修改標題）",
           max_score: 5,
           detectable: "manual",
           detection_method: "",
           description: "",
           fallback: ""
        });
        reRenderCurrentCard();
      }

      function reRenderCurrentCard() {
        if (!currentEditableCardDiv) return;
        const stats = calculateRubricStats(currentRubricItems);
        
        const analysis = {
            items: currentRubricItems,
            total_score: stats.totalScore,
            auto_count: stats.autoCount,
            partial_count: stats.partialCount,
            manual_count: stats.manualCount,
            summary: currentRubricSummary
        };
        const newHtml = renderRubricCard(analysis, "🔄 評分表（編輯中）", true);
        currentEditableCardDiv.querySelector(".message-content").innerHTML = newHtml;
      }

      function buildSummaryText(items, totalScore, autoCount, partialCount, manualCount) {
        return `本評分表總分為 ${totalScore} 分，共 ${items.length} 個項目；可完全自動偵測 ${autoCount} 項、部分可偵測 ${partialCount} 項、需人工評閱 ${manualCount} 項。`;
      }

      // ── Upload handling ──
      function triggerFileSelect() {
        fileInput.value = "";
        fileInput.click();
      }

      async function handleFile(file) {
        if (!file) return;

        const allowed = [".docx", ".pdf"];
        const suffix  = "." + file.name.split(".").pop().toLowerCase();
        if (!allowed.includes(suffix)) {
          alert(`不支援的格式：${suffix}，請上傳 .docx 或 .pdf`);
          return;
        }

        // Show user message
        renderMessage("user", `📎 ${escapeHtml(file.name)}`);

        // Remove upload area from DOM
        const uploadAreaMsg = document.getElementById("upload-area-msg");
        if (uploadAreaMsg) uploadAreaMsg.remove();

        typingIndicator.style.display = "block";
        typingIndicator.textContent = "解析文件並分析評分表中...";
        btnSend.disabled = true;
        btnUploadTrigger.disabled = true;
        btnUploadNew.disabled = true;

        try {
          const formData = new FormData();
          formData.append("file", file);

          const res = await fetch(`${apiBaseUrl}/upload-rubric`, {
            method: "POST",
            body: formData,
          });

          if (!res.ok) {
            const errText = await res.text();
            throw new Error(errText);
          }

          const data = await res.json();
          updateMetrics(data.ai_metrics);

          const analysis = data.analysis;
          currentRubricItems   = analysis.items || [];
          currentRubricSummary = analysis.summary || "";

          freezeOldCard();
          currentEditableCardDiv = renderMessage("assistant", renderRubricCard(analysis, "📋 評分表分析結果", true));

          // Update rubric context for future chat
          const rubricContext = JSON.stringify({ items: currentRubricItems, summary: currentRubricSummary });
          conversationHistory = [];   // reset chat history on new upload

          // Enable chat
          userInput.disabled = false;
          btnSend.disabled   = false;
          btnDownload.style.display = "";

        } catch (err) {
          renderMessage("assistant", `[分析失敗] ${escapeHtml(String(err.message || err))}`);
        } finally {
          typingIndicator.style.display = "none";
          typingIndicator.textContent = "分析中...";
          btnUploadTrigger.disabled = false;
          btnUploadNew.disabled = false;
        }
      }

      // ── Chat ──
      async function sendMessage() {
        let text = userInput.value.trim();
        if (!text && currentRubricItems.length === 0) return;
        if (btnSend.disabled) return;

        const isRefine = !text;  // 空白送出 = 請 AI 全表潤飾

        userInput.value = "";
        userInput.focus();

        if (isRefine) {
          // 僅在對話紀錄放一句簡短說明，不夾帶任何後端指令
          text = "請幫我審核並潤飾目前的評分表。";
          renderMessage("user", `<div style="font-style: italic; color: var(--muted);">[送出評分表，請 AI 進行全表審核潤飾...]</div>`);
        } else {
          renderMessage("user", escapeHtml(text));
        }

        conversationHistory.push({ role: "user", content: text });

        typingIndicator.style.display = "block";
        btnSend.disabled = true;

        try {
          const rubricContext = JSON.stringify({
            items: currentRubricItems,
            summary: currentRubricSummary,
          });

          const res = await fetch(`${apiBaseUrl}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              messages: conversationHistory,
              rubric_context: rubricContext,
              is_refine: isRefine,
            }),
          });

          if (!res.ok) throw new Error(await res.text());

          const data = await res.json();
          updateMetrics(data);

          const reply = stripThinkTags(data.reply || "");

          // ── 同步更新評分表 ──
          const updatedItems = data.updated_items;
          if (Array.isArray(updatedItems) && updatedItems.length > 0) {
            // ⚠️ 安全檢查：防止 AI 返回不完整的列表導致資料遺失
            const originalCount = currentRubricItems.length;
            const updatedCount = updatedItems.length;
            
            // 如果 AI 返回的項目數量少於原本的數量，且不是明確的刪除操作，則發出警告
            if (updatedCount < originalCount) {
              const userMessage = conversationHistory[conversationHistory.length - 1]?.content || "";
              const isDeleteIntent = /刪除|移除|去掉|砍掉|拿掉/i.test(userMessage);
              
              if (!isDeleteIntent) {
                // 非刪除意圖但項目減少了 → 可能是 AI 錯誤
                const confirmed = confirm(
                  `⚠️ 安全警告\n\n` +
                  `原本有 ${originalCount} 個評分項目，但 AI 只返回了 ${updatedCount} 個項目。\n` +
                  `這可能導致 ${originalCount - updatedCount} 個項目遺失。\n\n` +
                  `是否要繼續套用 AI 的修改？\n` +
                  `（建議：取消後重新詢問 AI，或手動檢查）`
                );
                
                if (!confirmed) {
                  renderMessage("assistant", "⚠️ 已取消套用修改，評分表維持原樣。你可以重新詢問 AI，或手動編輯表單。");
                  return; // 不更新資料
                }
              }
            }
            
            // ✅ 表單有變更 → 凍結舊卡片 + 更新狀態 + 渲染新卡片
            freezeOldCard();
            
            // 更新前端狀態（後續聊天 & Excel 下載都用這份）
            currentRubricItems = updatedItems;

            // 重新計算 summary 統計
            const stats = calculateRubricStats(updatedItems);

            // 強制使用前端計算的摘要，避免 AI 加減法算錯總分
            const updatedSummary = buildSummaryText(updatedItems, stats.totalScore, stats.autoCount, stats.partialCount, stats.manualCount);
            currentRubricSummary = updatedSummary;

            // 顯示 AI 說明訊息
            if (reply) renderMessage("assistant", escapeHtml(reply));

            // 在對話中插入更新後的評分表卡片
            const updatedAnalysis = {
              items: updatedItems,
              total_score: stats.totalScore,
              auto_count: stats.autoCount,
              partial_count: stats.partialCount,
              manual_count: stats.manualCount,
              summary: updatedSummary,
            };
            currentEditableCardDiv = renderMessage("assistant", renderRubricCard(updatedAnalysis, "🔄 評分表已更新", true));

          } else {
            // ✅ 純聊天（表單沒變）→ 只顯示文字回覆，保持原卡片可編輯
            if (reply) renderMessage("assistant", escapeHtml(reply));
            // 不凍結、不重新渲染卡片，讓使用者可以繼續編輯原本的表單
          }

          conversationHistory.push({ role: "assistant", content: reply });

          // History limit
          if (conversationHistory.length > 10) {
            conversationHistory = conversationHistory.slice(-10);
          }

        } catch (err) {
          renderMessage("assistant", `[系統異常] ${escapeHtml(String(err.message || err))}`);
        } finally {
          typingIndicator.style.display = "none";
          btnSend.disabled = false;
        }
      }

      // ── Download Excel ──
      async function downloadExcel() {
        if (!currentRubricItems.length) {
          alert("請先上傳並分析評分表。");
          return;
        }

        btnDownload.disabled = true;
        btnDownload.textContent = "匯出中...";

        try {
          const res = await fetch(`${apiBaseUrl}/download-excel`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              items: currentRubricItems,
              summary: currentRubricSummary,
            }),
          });

          if (!res.ok) throw new Error(await res.text());

          const blob = await res.blob();
          const url  = URL.createObjectURL(blob);
          const a    = document.createElement("a");
          a.href     = url;
          a.download = "rubric.xlsx";
          a.click();
          URL.revokeObjectURL(url);

        } catch (err) {
          alert(`下載失敗：${err.message || err}`);
        } finally {
          btnDownload.disabled = false;
          btnDownload.textContent = "📥 下載 Excel";
        }
      }

      // ── Event listeners ──
      btnSend.addEventListener("click", sendMessage);
      btnDownload.addEventListener("click", downloadExcel);
      btnUploadTrigger.addEventListener("click", triggerFileSelect);
      btnUploadNew.addEventListener("click", triggerFileSelect);

      uploadZone.addEventListener("click", triggerFileSelect);

      // ── Upload zone drag events ──
      uploadZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadZone.classList.add("drag-over");
      });

      uploadZone.addEventListener("dragleave", (e) => {
        e.stopPropagation();
        uploadZone.classList.remove("drag-over");
      });

      uploadZone.addEventListener("drop", (e) => {
        e.preventDefault();
        e.stopPropagation(); // 阻止冒泡至 document.drop，避免雙重觸發
        uploadZone.classList.remove("drag-over");
        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
      });

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (file) handleFile(file);
      });

      userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // 整頁 dragover 只阻止瀏覽器預設開檔行為，不觸發上傳
      // 實際上傳只由 uploadZone.drop 或 fileInput.change 觸發
      document.addEventListener("dragover", (e) => e.preventDefault());
      document.addEventListener("drop", (e) => e.preventDefault());

      loadUiConfig();
    </script>
  </body>
</html>
