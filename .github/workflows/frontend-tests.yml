name: Frontend Tests

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-tests.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-tests.yml"

concurrency:
  group: frontend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: vitest + biome + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome lint + format check
        run: bunx biome check .

      - name: Run vitest
        run: bunx vitest run

      - name: Type-check + production build
        # `bun run build` runs `tsc --noEmit` then `vite build`
        # If the OpenAPI client is missing, generate-client step would normally
        # be required, but we ship the generated client in-repo, so build works.
        run: bun run build

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
          if-no-files-found: ignore
