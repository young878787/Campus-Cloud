<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Cloud Connect</title>
<style>
  :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6; --accent-hover: #2563eb; --green: #22c55e; --red: #ef4444; --yellow: #eab308; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 800px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 1.5rem; margin-bottom: 8px; }
  .subtitle { color: var(--muted); margin-bottom: 24px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .card-title { font-size: 1.1rem; font-weight: 600; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { background: #dc2626; }
  .btn-success { background: var(--green); color: white; }
  .btn-success:hover { background: #16a34a; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--surface); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Status badge */
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 9999px; font-size: 0.8rem; font-weight: 500; }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--yellow); }

  /* Login screen */
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
  .login-screen h1 { font-size: 2rem; margin-bottom: 12px; }
  .login-screen .subtitle { margin-bottom: 32px; }

  /* Tunnel table */
  .tunnel-table { width: 100%; border-collapse: collapse; }
  .tunnel-table th { text-align: left; color: var(--muted); font-size: 0.8rem; font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .tunnel-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
  .tunnel-table tr:last-child td { border-bottom: none; }
  .mono { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.85rem; color: var(--accent); }

  /* Resource grid */
  .resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .resource-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .resource-name { font-weight: 600; margin-bottom: 4px; }
  .resource-info { color: var(--muted); font-size: 0.85rem; }

  /* Toolbar */
  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; }
  .spacer { flex: 1; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 0.9rem; z-index: 100; animation: slideIn 0.3s ease; }
  .toast-success { background: var(--green); color: white; }
  .toast-error { background: var(--red); color: white; }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .hidden { display: none !important; }
  .section { margin-bottom: 32px; }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }
  .spinner-lg { width: 24px; height: 24px; border-width: 3px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Phase panel (shown while tunnel is starting) */
  .phase-panel {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 10px;
    margin-top: 8px;
  }
  .phase-panel .phase-text { flex: 1; }
  .phase-panel .phase-msg { font-size: 0.95rem; }
  .phase-panel .phase-sub { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 9999px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 9999px;
    transition: width 0.2s ease;
  }
  .progress-bar-indeterminate {
    width: 30%;
    animation: indeterminate 1.4s ease-in-out infinite;
  }
  @keyframes indeterminate {
    0% { margin-left: -30%; }
    100% { margin-left: 100%; }
  }

  /* Login pending state */
  .login-pending {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 10px;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <h1>Campus Cloud Connect</h1>
    <p class="subtitle">使用 Google 帳號登入以連線你的虛擬機器</p>
    <button class="btn btn-primary" onclick="doLogin()" id="loginBtn">
      登入 Campus Cloud
    </button>
    <p style="color: var(--muted); font-size: 0.85rem; margin-top: 12px;">將會開啟瀏覽器進行登入</p>
    <div id="loginPending" class="login-pending hidden" style="margin-top: 16px;">
      <span class="spinner"></span>
      <span>請在瀏覽器中完成登入…</span>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" class="hidden">
    <div class="toolbar">
      <h1>Campus Cloud Connect</h1>
      <div class="spacer"></div>
      <button class="btn btn-outline" onclick="doLogout()">登出</button>
    </div>

    <!-- Tunnel Control -->
    <div class="section">
      <div class="card">
        <div class="card-header">
          <span class="card-title">frp 隧道</span>
          <div id="tunnelBadge">
            <span class="badge badge-red"><span class="dot dot-red"></span>未連線</span>
          </div>
        </div>
        <div id="tunnelActions">
          <button class="btn btn-success" onclick="startTunnel()" id="startTunnelBtn">啟動隧道</button>
        </div>
        <!-- Phase panel: shown while tunnel is starting (downloading frpc, etc.) -->
        <div id="tunnelPhase" class="phase-panel hidden">
          <span class="spinner spinner-lg"></span>
          <div class="phase-text">
            <div class="phase-msg" id="tunnelPhaseMsg">準備中…</div>
            <div class="phase-sub" id="tunnelPhaseSub"></div>
            <div class="progress-bar hidden" id="tunnelProgressBar">
              <div class="progress-bar-fill" id="tunnelProgressFill" style="width: 0%"></div>
            </div>
          </div>
        </div>
        <div id="tunnelRunning" class="hidden">
          <button class="btn btn-danger" onclick="stopTunnel()" style="margin-bottom: 16px;">停止隧道</button>
          <table class="tunnel-table">
            <thead>
              <tr><th>虛擬機</th><th>服務</th><th>本機位址</th></tr>
            </thead>
            <tbody id="tunnelTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Resources -->
    <div class="section">
      <div class="card-header" style="margin-bottom: 12px;">
        <span class="card-title">我的資源</span>
      </div>
      <div id="resourceGrid" class="resource-grid"></div>
      <p id="noResources" class="hidden" style="color: var(--muted); text-align: center; padding: 24px;">沒有資源</p>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
let pollTimer = null;

async function fetchJSON(url, opts) {
  const resp = await fetch(url, opts);
  return resp.json();
}

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.add('hidden'), 4000);
}

async function checkState() {
  try {
    const state = await fetchJSON('/api/state');
    if (state.logged_in) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      loadResources();
      updateTunnelUI(state.tunnel);
    } else {
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('mainApp').classList.add('hidden');
    }
  } catch (e) { /* ignore */ }
}

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 正在開啟瀏覽器…';
  document.getElementById('loginPending').classList.remove('hidden');
  try {
    await fetchJSON('/api/login', { method: 'POST' });
    // Poll for login completion
    let attempts = 0;
    const check = setInterval(async () => {
      attempts++;
      const state = await fetchJSON('/api/state');
      if (state.logged_in) {
        clearInterval(check);
        showToast('登入成功！', 'success');
        checkState();
      } else if (attempts > 150) { // 5 min timeout
        clearInterval(check);
        showToast('登入逾時', 'error');
        resetLoginBtn();
      }
    }, 2000);
  } catch (e) {
    showToast('登入失敗: ' + e.message, 'error');
    resetLoginBtn();
  }
}

function resetLoginBtn() {
  const btn = document.getElementById('loginBtn');
  btn.disabled = false;
  btn.textContent = '登入 Campus Cloud';
  document.getElementById('loginPending').classList.add('hidden');
}

async function doLogout() {
  await fetchJSON('/api/logout', { method: 'POST' });
  showToast('已登出', 'success');
  checkState();
}

async function loadResources() {
  try {
    const resources = await fetchJSON('/api/resources');
    const grid = document.getElementById('resourceGrid');
    const noRes = document.getElementById('noResources');
    if (!resources || resources.length === 0) {
      grid.innerHTML = '';
      noRes.classList.remove('hidden');
      return;
    }
    noRes.classList.add('hidden');
    grid.innerHTML = resources.map(r => `
      <div class="resource-card">
        <div class="resource-name">${r.environment_type || r.name || 'VM-' + r.vmid}</div>
        <div class="resource-info">
          VMID: ${r.vmid}<br>
          類型: ${r.type === 'qemu' ? 'VM' : 'LXC'}<br>
          狀態: <span style="color: ${r.status === 'running' ? 'var(--green)' : 'var(--muted)'}">${r.status}</span><br>
          ${r.ip_address ? 'IP: ' + r.ip_address : ''}
        </div>
      </div>
    `).join('');
  } catch (e) {
    showToast('載入資源失敗', 'error');
  }
}

async function startTunnel() {
  const btn = document.getElementById('startTunnelBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 啟動中…';
  try {
    // Start is async on the backend — it returns immediately with phase="preparing".
    // We poll /api/tunnel/status quickly to show phase transitions.
    const result = await fetchJSON('/api/tunnel/start', { method: 'POST' });
    if (result.error) {
      showToast(result.error, 'error');
      btn.disabled = false;
      btn.textContent = '啟動隧道';
      return;
    }
    updateTunnelUI(result);
    startFastPoll();
  } catch (e) {
    showToast('啟動失敗: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '啟動隧道';
  }
}

// Fast poll (1s) while tunnel is in a transitional phase; falls back to the
// normal 5s poll once it reaches a terminal state (running / error / idle).
let fastPollTimer = null;
function startFastPoll() {
  if (fastPollTimer) return;
  fastPollTimer = setInterval(async () => {
    try {
      const status = await fetchJSON('/api/tunnel/status');
      updateTunnelUI(status);
      const transitional =
        status.phase === 'preparing' ||
        status.phase === 'excluding' ||
        status.phase === 'downloading' ||
        status.phase === 'extracting' ||
        status.phase === 'starting';
      if (!transitional) {
        clearInterval(fastPollTimer);
        fastPollTimer = null;
        if (status.phase === 'error') {
          showToast(status.error || '啟動失敗', 'error');
        } else if (status.running) {
          showToast('隧道已啟動！', 'success');
        }
      }
    } catch (e) { /* ignore */ }
  }, 1000);
}

async function stopTunnel() {
  await fetchJSON('/api/tunnel/stop', { method: 'POST' });
  showToast('隧道已停止', 'success');
  updateTunnelUI({ running: false, tunnels: [] });
}

function formatBytes(n) {
  if (!n || n < 0) return '';
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}

function updateTunnelUI(status) {
  const badge = document.getElementById('tunnelBadge');
  const actions = document.getElementById('tunnelActions');
  const phasePanel = document.getElementById('tunnelPhase');
  const phaseMsg = document.getElementById('tunnelPhaseMsg');
  const phaseSub = document.getElementById('tunnelPhaseSub');
  const progressBar = document.getElementById('tunnelProgressBar');
  const progressFill = document.getElementById('tunnelProgressFill');
  const running = document.getElementById('tunnelRunning');
  const tbody = document.getElementById('tunnelTableBody');
  const startBtn = document.getElementById('startTunnelBtn');

  const phase = status && status.phase;
  const transitional =
    phase === 'preparing' || phase === 'excluding' ||
    phase === 'downloading' || phase === 'extracting' || phase === 'starting';

  // Reset sub-panels, then turn on the one that matches current state.
  actions.classList.add('hidden');
  phasePanel.classList.add('hidden');
  running.classList.add('hidden');

  if (status && status.running) {
    // Connected
    badge.innerHTML = '<span class="badge badge-green"><span class="dot dot-green"></span>已連線</span>';
    running.classList.remove('hidden');
    tbody.innerHTML = (status.tunnels || []).map(t => `
      <tr>
        <td>${t.vm_name || 'VM-' + t.vmid} <span style="color:var(--muted)">(${t.vmid})</span></td>
        <td>${t.service.toUpperCase()}</td>
        <td class="mono">127.0.0.1:${t.local_port}</td>
      </tr>
    `).join('');
  } else if (transitional) {
    // Startup in progress — show phase panel with spinner
    badge.innerHTML = '<span class="badge badge-yellow"><span class="dot dot-yellow"></span>啟動中</span>';
    phasePanel.classList.remove('hidden');
    phaseMsg.textContent = status.message || phaseLabel(phase);
    phaseSub.textContent = phaseSubLabel(phase);

    // Progress bar — determinate if we have Content-Length, otherwise indeterminate
    if (phase === 'downloading') {
      progressBar.classList.remove('hidden');
      const total = status.download_total || 0;
      const done = status.download_done || 0;
      if (total > 0) {
        progressFill.classList.remove('progress-bar-indeterminate');
        const pct = Math.min(100, (done / total) * 100);
        progressFill.style.width = pct.toFixed(1) + '%';
        phaseSub.textContent = `${formatBytes(done)} / ${formatBytes(total)} (${pct.toFixed(0)}%)`;
      } else {
        progressFill.classList.add('progress-bar-indeterminate');
        progressFill.style.width = '';
        if (done > 0) phaseSub.textContent = `已下載 ${formatBytes(done)}`;
      }
    } else {
      progressBar.classList.add('hidden');
    }
  } else {
    // Idle or error
    const errored = phase === 'error' || (status && status.error);
    if (errored) {
      badge.innerHTML = '<span class="badge badge-red"><span class="dot dot-red"></span>錯誤</span>';
    } else {
      badge.innerHTML = '<span class="badge badge-red"><span class="dot dot-red"></span>未連線</span>';
    }
    actions.classList.remove('hidden');
    startBtn.disabled = false;
    startBtn.textContent = '啟動隧道';
  }
}

function phaseLabel(phase) {
  switch (phase) {
    case 'preparing':   return '準備中…';
    case 'excluding':   return '加入 Defender 排除（請按 UAC 的「是」）…';
    case 'downloading': return '下載 frpc 中…';
    case 'extracting':  return '解壓縮中…';
    case 'starting':    return '啟動 frpc 中…';
    default: return '處理中…';
  }
}

function phaseSubLabel(phase) {
  switch (phase) {
    case 'excluding':   return '這只會在第一次啟動時出現';
    case 'downloading': return '首次啟動需下載 frpc 約 10 MB';
    default: return '';
  }
}

// Poll tunnel status every 5 seconds when running
setInterval(async () => {
  try {
    const status = await fetchJSON('/api/tunnel/status');
    updateTunnelUI(status);
  } catch (e) { /* ignore */ }
}, 5000);

// Initial state check
checkState();
// Re-check login state periodically (for when OAuth callback completes)
setInterval(checkState, 3000);
</script>
</body>
</html>
