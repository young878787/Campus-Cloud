<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Log Analytics</title>
    <style>
      :root {
        --bg: #f1e7d9;
        --surface: rgba(255, 250, 244, 0.78);
        --surface-strong: rgba(255, 252, 247, 0.92);
        --line: rgba(93, 70, 48, 0.14);
        --line-soft: rgba(93, 70, 48, 0.08);
        --ink: #181412;
        --muted: #6e645a;
        --accent: #a44f22;
        --accent-soft: rgba(164, 79, 34, 0.12);
        --teal: #285769;
        --good: #2f6a4b;
        --warn: #a87522;
        --bad: #b14335;
        --shadow: 0 18px 50px rgba(58, 35, 21, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Noto Sans TC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(164, 79, 34, 0.18), transparent 28%),
          radial-gradient(circle at bottom right, rgba(40, 87, 105, 0.14), transparent 30%),
          linear-gradient(135deg, #f7f0e6, var(--bg));
      }

      main {
        max-width: 1440px;
        margin: 0 auto;
        padding: 28px 18px 36px;
      }

      .hero {
        display: grid;
        gap: 14px;
        margin-bottom: 18px;
        padding: 22px 24px;
        border: 1px solid var(--line);
        border-radius: 30px;
        background: linear-gradient(145deg, rgba(255, 251, 246, 0.92), rgba(247, 238, 228, 0.78));
        box-shadow: var(--shadow);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 7px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hero-top {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: end;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(34px, 5.5vw, 58px);
        line-height: 0.98;
      }

      .hero p {
        margin: 0;
        max-width: 780px;
        color: var(--muted);
        line-height: 1.72;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.16s ease, opacity 0.16s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .btn-primary {
        color: #fffaf5;
        background: linear-gradient(135deg, #a44f22, #cd7440);
      }

      .btn-secondary {
        color: var(--teal);
        background: rgba(40, 87, 105, 0.12);
      }

      .workspace {
        display: grid;
        gap: 18px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
      }

      .dashboard {
        padding: 20px 22px;
      }

      .header-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }

      .header-row h2,
      .chat-header h2 {
        margin: 0 0 4px;
        font-size: 20px;
      }

      .header-row p,
      .chat-header p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        justify-content: end;
        gap: 8px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--line-soft);
        background: rgba(255, 255, 255, 0.62);
        color: var(--muted);
        font-size: 12px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--muted);
      }

      .dot.good { background: var(--good); }
      .dot.warn { background: var(--warn); }
      .dot.bad { background: var(--bad); }

      .summary {
        margin-top: 16px;
        padding: 18px 20px;
        border-radius: 24px;
        color: #fff9f4;
        background: linear-gradient(135deg, #7e3f20, #295669);
      }

      .summary p {
        margin: 0;
        color: inherit;
        line-height: 1.8;
      }

      .metrics {
        display: grid;
        gap: 14px;
        margin-top: 18px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .metric {
        padding: 12px 4px 14px;
        border-bottom: 1px solid var(--line-soft);
      }

      .metric-label {
        color: var(--muted);
        font-size: 13px;
      }

      .metric-value {
        margin-top: 6px;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .dashboard-sections {
        display: grid;
        gap: 0;
        margin-top: 12px;
      }

      .section {
        padding: 18px 0;
        border-top: 1px solid var(--line-soft);
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: end;
        margin-bottom: 12px;
      }

      .section-head h3 {
        margin: 0;
        font-size: 16px;
      }

      .section-head span {
        color: var(--muted);
        font-size: 13px;
      }

      .rows {
        display: grid;
        gap: 10px;
      }

      .row {
        display: grid;
        gap: 6px;
        padding: 12px 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.5);
      }

      .row strong {
        font-size: 15px;
      }

      .row p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .severity {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        margin-bottom: 4px;
        padding: 4px 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .severity.info { background: rgba(40, 87, 105, 0.12); color: var(--teal); }
      .severity.low { background: rgba(47, 106, 75, 0.12); color: var(--good); }
      .severity.medium { background: rgba(168, 117, 34, 0.16); color: var(--warn); }
      .severity.high,
      .severity.critical { background: rgba(177, 67, 53, 0.14); color: var(--bad); }

      .chat {
        display: flex;
        flex-direction: column;
        min-height: 780px;
      }

      .chat-header {
        padding: 20px 22px 14px;
      }

      .chat-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 0 22px 18px;
      }

      .quick-asks {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      .messages {
        flex: 1;
        min-height: 460px;
        max-height: 640px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding-right: 4px;
      }

      .message {
        max-width: 90%;
        padding: 14px 16px;
        border-radius: 20px;
        line-height: 1.75;
        white-space: pre-wrap;
      }

      .message.user {
        align-self: flex-end;
        color: #fffaf5;
        background: linear-gradient(135deg, #a44f22, #c76f3c);
      }

      .message.assistant {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.72);
      }

      .message small {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .composer {
        display: grid;
        gap: 10px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--line-soft);
      }

      textarea {
        width: 100%;
        min-height: 116px;
        resize: vertical;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--ink);
        font: inherit;
      }

      .composer-foot {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
      }

      .empty {
        padding: 16px;
        border-radius: 18px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.34);
      }

      @media (min-width: 1100px) {
        .workspace {
          grid-template-columns: minmax(0, 1.28fr) minmax(360px, 0.82fr);
          align-items: start;
        }
      }

      @media (max-width: 900px) {
        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .hero-top,
        .header-row,
        .composer-foot {
          flex-direction: column;
          align-items: start;
        }

        .metrics {
          grid-template-columns: 1fr 1fr;
        }

        .message {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="eyebrow">Campus Cloud AI Ops</div>
        <div class="hero-top">
          <div>
            <h1>AI Log Analytics</h1>
            <p>
              把節點監控、資源狀態、audit log 與 AI 解釋整合成一個較乾淨的工作台，
              讓你先看到重點，再決定是否繼續追問。
            </p>
          </div>
          <div class="actions">
            <button id="refreshButton" class="btn-primary">重新分析</button>
            <button id="explainButton" class="btn-secondary">解釋目前狀態</button>
          </div>
        </div>
      </section>

      <section class="workspace">
        <section class="panel dashboard">
          <div class="header-row">
            <div>
              <h2>Overview</h2>
              <p id="statusLine">正在載入分析結果。</p>
            </div>
            <div class="chips" id="sourceHealth"></div>
          </div>

          <div class="summary">
            <p id="summaryText">尚未取得分析結果。</p>
          </div>

          <div class="metrics" id="statsGrid"></div>

          <div class="dashboard-sections">
            <section class="section">
              <div class="section-head">
                <h3>重點事件</h3>
                <span>只保留最重要的風險</span>
              </div>
              <div class="rows" id="eventsList">
                <div class="empty">目前沒有事件資料。</div>
              </div>
            </section>

            <section class="section">
              <div class="section-head">
                <h3>優先建議</h3>
                <span>聚焦可執行動作</span>
              </div>
              <div class="rows" id="recommendationsList">
                <div class="empty">目前沒有建議資料。</div>
              </div>
            </section>
          </div>
        </section>

        <aside class="panel chat">
          <div class="chat-header">
            <h2>AI Chat</h2>
            <p id="chatHint">可直接追問目前最重要的風險、資源瓶頸或建議順序。</p>
          </div>

          <div class="chat-body">
            <div class="quick-asks">
              <button class="btn-secondary quick-ask" data-question="請用管理員角度說明目前最需要優先處理的風險。">管理員視角</button>
              <button class="btn-secondary quick-ask" data-question="請用老師角度說明目前資源分配是否合理。">老師視角</button>
              <button class="btn-secondary quick-ask" data-question="請用學生能理解的方式說明現在系統狀況。">學生視角</button>
            </div>

            <div class="messages" id="messages"></div>

            <div class="composer">
              <textarea
                id="questionInput"
                placeholder="輸入你的追問，例如：現在最需要先處理的是哪個風險？如果我要降低 GPU 浪費，應該先做哪兩件事？"
              ></textarea>
              <div class="composer-foot">
                <button id="sendButton" class="btn-primary">送出問題</button>
                <span class="hint" id="composerHint">若未設定 VLLM，系統會自動改用規則式解釋。</span>
              </div>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <script>
      const state = {
        analysis: null,
        history: [],
        uiConfig: { apiBaseUrl: "", apiV1Str: "/api/v1", aiConfigured: false },
      };

      const els = {
        refreshButton: document.getElementById("refreshButton"),
        explainButton: document.getElementById("explainButton"),
        statusLine: document.getElementById("statusLine"),
        summaryText: document.getElementById("summaryText"),
        sourceHealth: document.getElementById("sourceHealth"),
        statsGrid: document.getElementById("statsGrid"),
        eventsList: document.getElementById("eventsList"),
        recommendationsList: document.getElementById("recommendationsList"),
        messages: document.getElementById("messages"),
        questionInput: document.getElementById("questionInput"),
        sendButton: document.getElementById("sendButton"),
        chatHint: document.getElementById("chatHint"),
        composerHint: document.getElementById("composerHint"),
      };

      function apiUrl(path) {
        const base = state.uiConfig.apiBaseUrl || "";
        return `${base}${path}`;
      }

      function formatPercent(value, digits = 1) {
        if (value === null || value === undefined || Number.isNaN(Number(value))) {
          return "-";
        }
        return `${(Number(value) * 100).toFixed(digits)}%`;
      }

      function formatDate(value) {
        if (!value) return "-";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("zh-TW", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        }).format(date);
      }

      function renderList(target, items, renderItem, emptyText) {
        if (!items.length) {
          target.innerHTML = `<div class="empty">${emptyText}</div>`;
          return;
        }
        target.innerHTML = items.map(renderItem).join("");
      }

      function renderStats(aggregation) {
        const cards = [
          ["節點", aggregation.node_count],
          ["資源", aggregation.resource_count],
          ["平均 CPU", formatPercent(aggregation.avg_node_cpu_ratio)],
          ["平均記憶體", formatPercent(aggregation.avg_node_memory_ratio)],
          ["Token", aggregation.total_tokens.toLocaleString("en-US")],
          ["GPU", aggregation.gpu_count],
        ];

        els.statsGrid.innerHTML = cards
          .map(
            ([label, value]) => `
              <article class="metric">
                <div class="metric-label">${label}</div>
                <div class="metric-value">${value}</div>
              </article>
            `
          )
          .join("");
      }

      function renderSourceHealth(items) {
        els.sourceHealth.innerHTML = items
          .map((item) => {
            const cls = item.available ? "good" : item.mode === "snapshot" ? "warn" : "bad";
            return `
              <span class="chip">
                <span class="dot ${cls}"></span>
                <span>${item.name}</span>
              </span>
            `;
          })
          .join("");
      }

      function renderAnalysis(analysis) {
        state.analysis = analysis;
        els.summaryText.textContent = analysis.summary;
        els.statusLine.textContent = `更新於 ${formatDate(analysis.generated_at)}，目前偵測到 ${analysis.events.length} 個事件。`;
        renderStats(analysis.aggregation);
        renderSourceHealth(analysis.source_health);

        renderList(
          els.eventsList,
          analysis.events.slice(0, 4),
          (item) => `
            <article class="row">
              <span class="severity ${item.severity}">${item.severity.toUpperCase()} · score ${item.score}</span>
              <strong>${item.summary}</strong>
              <p>${buildEventHint(item)}</p>
            </article>
          `,
          "目前沒有事件資料。"
        );

        renderList(
          els.recommendationsList,
          analysis.recommendations.slice(0, 4),
          (item) => `
            <article class="row">
              <strong>${item.action}</strong>
              <p>${item.reason}</p>
            </article>
          `,
          "目前沒有建議資料。"
        );
      }

      function buildEventHint(item) {
        const evidence = item.evidence || {};
        if (item.code === "high_cpu" && evidence.avg_node_cpu_ratio !== undefined) {
          return `目前平均 CPU 使用率約 ${formatPercent(evidence.avg_node_cpu_ratio)}。`;
        }
        if (item.code === "high_memory" && evidence.avg_node_memory_ratio !== undefined) {
          return `目前平均記憶體使用率約 ${formatPercent(evidence.avg_node_memory_ratio)}。`;
        }
        if (item.code === "oom_risk" && evidence.count !== undefined) {
          return `接近上限的資源數量: ${evidence.count}。`;
        }
        if (item.code === "token_spike" && evidence.token_growth_ratio !== undefined) {
          return `Token 成長比約 ${Number(evidence.token_growth_ratio).toFixed(2)}。`;
        }
        if (item.code === "gpu_idle_waste" && evidence.count !== undefined) {
          return `低利用率 GPU 節點數量: ${evidence.count}。`;
        }
        return "請在右側聊天框追問更細的原因與處理順序。";
      }

      function pushMessage(role, content, meta = "") {
        const message = document.createElement("article");
        message.className = `message ${role}`;
        message.textContent = content;
        if (meta) {
          const small = document.createElement("small");
          small.textContent = meta;
          message.appendChild(small);
        }
        els.messages.appendChild(message);
        els.messages.scrollTop = els.messages.scrollHeight;
      }

      async function loadUiConfig() {
        try {
          const response = await fetch("/ui-config");
          if (!response.ok) throw new Error("ui-config failed");
          state.uiConfig = await response.json();
          if (state.uiConfig.aiConfigured || state.uiConfig.ai_configured) {
            els.chatHint.textContent = "AI 已設定，可直接根據目前分析結果繼續追問。";
            els.composerHint.textContent = "目前會優先使用 VLLM 產生解釋。";
          }
        } catch (_error) {
          state.uiConfig = { apiBaseUrl: "", apiV1Str: "/api/v1", aiConfigured: false };
        }
      }

      async function loadAnalysis() {
        els.refreshButton.disabled = true;
        els.refreshButton.textContent = "分析中";
        try {
          const response = await fetch(apiUrl(`${state.uiConfig.apiV1Str}/analyze`));
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          renderAnalysis(data);
          if (!state.history.length) {
            const opening = `系統摘要：${data.summary}`;
            pushMessage(
              "assistant",
              opening,
              state.uiConfig.aiConfigured || state.uiConfig.ai_configured
                ? "目前可使用 AI 解釋。"
                : "目前使用規則式解釋。"
            );
            state.history.push({ role: "assistant", content: opening });
          }
        } catch (error) {
          els.statusLine.textContent = `分析失敗: ${error.message}`;
          els.summaryText.textContent = "目前無法取得分析結果，請確認資料來源設定。";
        } finally {
          els.refreshButton.disabled = false;
          els.refreshButton.textContent = "重新分析";
        }
      }

      async function ask(question) {
        const trimmed = question.trim();
        if (!trimmed) return;

        pushMessage("user", trimmed);
        state.history.push({ role: "user", content: trimmed });
        els.questionInput.value = "";
        els.sendButton.disabled = true;
        els.sendButton.textContent = "思考中";

        try {
          const response = await fetch(apiUrl(`${state.uiConfig.apiV1Str}/chat`), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              question: trimmed,
              history: state.history.slice(-8),
              limit_audit_logs: 200,
            }),
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          renderAnalysis(data.analysis);
          const meta = data.ai_used
            ? `AI 模型: ${data.model || "configured model"}`
            : (data.warning || "已使用規則式解釋");
          pushMessage("assistant", data.answer, meta);
          state.history.push({ role: "assistant", content: data.answer });
        } catch (error) {
          pushMessage("assistant", `目前無法完成這次解釋。錯誤: ${error.message}`);
        } finally {
          els.sendButton.disabled = false;
          els.sendButton.textContent = "送出問題";
        }
      }

      els.refreshButton.addEventListener("click", loadAnalysis);
      els.explainButton.addEventListener("click", () => {
        ask("請說明目前最重要的風險、原因，以及優先處理順序。");
      });
      els.sendButton.addEventListener("click", () => ask(els.questionInput.value));
      els.questionInput.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
          ask(els.questionInput.value);
        }
      });
      document.querySelectorAll(".quick-ask").forEach((button) => {
        button.addEventListener("click", () => ask(button.dataset.question || ""));
      });

      (async function init() {
        await loadUiConfig();
        await loadAnalysis();
      })();
    </script>
  </body>
</html>
