<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PVE Resource Simulator</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">PVE Resource Simulator</p>
        <h1>以真實 PVE 資料推估 VM 放置與時段容量</h1>
        <p id="scenario-note" class="hero-copy"></p>
      </header>

      <section class="layout">
        <section class="controls">
          <div class="section-head">
            <div>
              <p class="section-kicker">Add VM</p>
              <h2>新增待申請 VM</h2>
            </div>
            <button id="reset-all" class="button subtle" type="button">重設</button>
          </div>

          <form id="vm-form" class="vm-form">
            <label>
              <span>名稱</span>
              <input id="vm-name" type="text" placeholder="例如 vm-101" />
            </label>
            <label>
              <span>CPU</span>
              <input id="vm-cpu" type="number" min="0.5" step="0.5" value="2" />
            </label>
            <label>
              <span>RAM GB</span>
              <input id="vm-ram" type="number" min="0.5" step="0.5" value="4" />
            </label>
            <label>
              <span>Disk GB</span>
              <input id="vm-disk" type="number" min="1" step="1" value="40" />
            </label>

            <section class="slot-picker">
              <div class="slot-head">
                <p class="field-title">啟用時段</p>
                <p id="slot-summary" class="helper-text"></p>
              </div>
              <div class="range-picker">
                <label class="range-field">
                  <span>開始</span>
                  <select id="vm-start-hour"></select>
                </label>
                <label class="range-field">
                  <span>結束</span>
                  <select id="vm-end-hour"></select>
                </label>
              </div>
            </section>

            <div class="form-actions">
              <button class="button primary" type="submit">加入模擬</button>
            </div>
          </form>

          <p id="error-banner" class="error-banner" hidden></p>

          <div class="section-head compact">
            <div>
              <p class="section-kicker">Reservations</p>
              <h2>待排程 VM</h2>
            </div>
            <p id="vm-count" class="count-label">0 台</p>
          </div>

          <div id="vm-list" class="vm-list"></div>
        </section>

        <section class="results">
          <div class="section-head compact">
            <div>
              <p class="section-kicker">Day View</p>
              <h2>PVE 每小時放置結果</h2>
            </div>
          </div>

          <div id="day-calendar" class="day-calendar"></div>

          <div class="timeline calculation-panel">
            <div class="timeline-meta">
              <p id="calc-label">本時段放置計算表</p>
              <p id="calc-caption">系統會先顯示申請值、命中的歷史類型與換算後的有效 CPU / RAM，再顯示放置結果。</p>
            </div>
            <div class="guest-table-wrap">
              <table class="guest-table simulator-table">
                <thead>
                  <tr>
                    <th>VM</th>
                    <th>Req</th>
                    <th>Profile</th>
                    <th>CPU%</th>
                    <th>RAM%</th>
                    <th>Base</th>
                    <th>Peak</th>
                    <th>Risk</th>
                    <th>Status</th>
                    <th>Node</th>
                  </tr>
                </thead>
                <tbody id="calculation-table-body"></tbody>
              </table>
            </div>
          </div>

          <div class="timeline">
            <div class="timeline-top">
              <p id="hour-summary" class="hour-summary"></p>
              <input id="step-slider" type="range" min="0" max="0" step="1" value="0" />
            </div>
            <div class="timeline-meta">
              <p id="step-label">逐步放置 VM</p>
              <p id="step-caption">系統會優先使用真實 PVE 的同類型歷史 CPU / RAM 平均，沒有歷史就退回保守申請值。</p>
            </div>
          </div>

          <div id="server-board" class="server-board"></div>
        </section>
      </section>
    </main>

    <script src="/static/app.js?v=20260331-2" defer></script>
  </body>
</html>
